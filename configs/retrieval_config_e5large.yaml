chunking:
  strategy: hybrid_article_aware
  min_chunk_chars: 300
  max_chunk_chars: 1200
  overlap_chars: 150

embedding:
  model_name: intfloat/multilingual-e5-large
  query_prefix: "query: "
  passage_prefix: "passage: "
  batch_size: 8
  normalize_embeddings: true

retrieval:
  top_k: 5

bm25:
  k1: 1.5
  b: 0.75

hybrid:
  dense_weight: 0.85
  bm25_weight: 0.15
  fusion_method: rrf
  rrf_k: 60

reranker:
  model_name: cross-encoder/mmarco-mMiniLMv2-L12-H384-v1
  candidate_multiplier: 5

input:
  registry_path: data/processed/corpus/corpus_registry.csv
  chunks_path: data/processed/corpus/corpus_chunks.jsonl

output:
  chunks_path: data/processed/corpus/corpus_chunks.jsonl
  embeddings_path: data/processed/corpus/chunk_embeddings_e5large.npy
  metadata_path: data/processed/corpus/chunk_metadata.jsonl
  faiss_index_path: data/processed/corpus/faiss_index_e5large.bin
